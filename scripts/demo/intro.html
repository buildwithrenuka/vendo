<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      color: #1d1d1f; text-align: center;
    }
    .bars { position: fixed; left: 0; right: 0; height: 72px; background: #f5f5f7; z-index: 10; }
    .bars.top { top: 0; animation: barIn 1.2s ease forwards; }
    .bars.bottom { bottom: 0; animation: barIn 1.2s ease forwards; }
    .glow {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 50% 40%, rgba(0, 107, 125, 0.1) 0%, transparent 58%),
        radial-gradient(ellipse 35% 30% at 80% 70%, rgba(78, 196, 212, 0.12) 0%, transparent 50%);
      animation: pulseGlow 4s ease-in-out infinite;
    }
    .content { position: relative; z-index: 2; padding: 2rem; }
    .logo {
      width: 100px; height: 100px; border-radius: 24px; margin: 0 auto 2.5rem;
      background: #006B7D;
      display: grid; place-items: center;
      box-shadow: 0 16px 48px rgba(0, 107, 125, 0.28);
      opacity: 0; animation: scaleIn 1s 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .logo svg { width: 52px; height: 52px; }
    h1 {
      font-size: 5.5rem; font-weight: 600; letter-spacing: -0.04em; line-height: 1;
      color: #1d1d1f;
      opacity: 0; animation: fadeUp 1s 0.7s forwards;
    }
    .tagline {
      margin-top: 1.25rem; font-size: 1.5rem; font-weight: 400; color: #6e6e73;
      opacity: 0; animation: fadeUp 1s 1s forwards;
    }
    .pill {
      display: inline-block; margin-top: 1.75rem;
      padding: 0.45rem 1.1rem; border-radius: 980px;
      font-size: 0.875rem; font-weight: 600; color: #006B7D;
      background: rgba(0, 107, 125, 0.12);
      border: 1px solid rgba(0, 107, 125, 0.25);
      opacity: 0; animation: fadeUp 0.8s 1.35s forwards;
    }
    .line {
      width: 0; height: 2px; margin: 2rem auto 0;
      background: linear-gradient(90deg, transparent, #4EC4D4, transparent);
      animation: lineGrow 1.2s 1.5s forwards;
    }
    .sub {
      margin-top: 1.5rem; font-size: 0.75rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: #86868b;
      opacity: 0; animation: fadeUp 0.8s 1.8s forwards;
    }
    @keyframes barIn { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }
    @keyframes lineGrow { to { width: 280px; } }
    @keyframes pulseGlow { 0%,100% { opacity: 0.75; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="bars top"></div>
  <div class="bars bottom"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 9 C15 9 12 19 12 26 C12 32 17 38 24 40 C31 38 36 32 36 26 C36 19 33 9 24 9 Z" fill="#ffffff"/>
        <path d="M24 13 C18 16 18 21 24 24 C30 27 30 32 24 35" stroke="#006B7D" stroke-width="2.25" stroke-linecap="round" fill="none" opacity="0.85"/>
      </svg>
    </div>
    <h1>Jal</h1>
    <p class="tagline">Feedback in. Features out.</p>
    <p class="pill">One widget. Full pipeline.</p>
    <div class="line"></div>
    <p class="sub">Product demo · 2026 UI</p>
  </div>
</body>
</html>
