<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; color: #1d1d1f;
    }
    .bars { position: fixed; left: 0; right: 0; height: 72px; background: #f5f5f7; }
    .bars.top { top: 0; } .bars.bottom { bottom: 0; }
    .wrap { text-align: center; padding: 2rem; max-width: 900px; }
    .num {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.35em; color: #006B7D;
      opacity: 0; animation: in 0.8s 0.2s forwards;
    }
    h1 {
      margin-top: 1rem; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900;
      letter-spacing: -0.03em; line-height: 1.1;
      opacity: 0; animation: in 0.9s 0.5s forwards;
    }
    p {
      margin-top: 1.25rem; font-size: 1.25rem; color: #6e6e73; line-height: 1.5;
      opacity: 0; animation: in 0.9s 0.85s forwards;
    }
    .line {
      width: 0; height: 2px; margin: 2rem auto 0;
      background: linear-gradient(90deg, transparent, #006B7D, #4EC4D4, transparent);
      animation: grow 1s 1.1s forwards;
    }
    @keyframes in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes grow { to { width: 200px; } }
  </style>
</head>
<body>
  <div class="bars top"></div>
  <div class="bars bottom"></div>
  <div class="wrap">
    <div class="num" id="num">01</div>
    <h1 id="title">Scene</h1>
    <p id="sub"></p>
    <div class="line"></div>
  </div>
  <script>
    const scenes = {
      river: { num: "01", title: "The Feedback River", sub: "Every droplet is a feature request — flowing from idea to ship" },
      lens: { num: "02", title: "Dual Lens", sub: "Customers track status. Your team runs the AI pipeline." },
      pr: { num: "03", title: "AI Build → Pull Request", sub: "Jal reads your repo, writes code, opens a GitHub PR" },
      studio: { num: "04", title: "Jal Studio", sub: "Attach any GitHub repo. Widget + dev queue in minutes." },
      ship: { num: "05", title: "Approve & Merge", sub: "Human in the loop. Full audit trail. Features ship." },
    };
    const key = new URLSearchParams(location.search).get("s") || "river";
    const s = scenes[key] || scenes.river;
    document.getElementById("num").textContent = s.num;
    document.getElementById("title").textContent = s.title;
    document.getElementById("sub").textContent = s.sub;
  </script>
</body>
</html>
